<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="/viralmaxlogo.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up — Viralmax</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --y: #FFE600; --o: #FF6B00; --blk: #050505; --blk2: #0a0a0a;
  --g1: #1a1a1a; --g2: #222; --g3: #2e2e2e;
  --tx: #f5f5f0; --tx2: #999; --tx3: #555;
  --grn: #00E676; --red: #FF3D3D;
}
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--blk);
  color: var(--tx);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.card {
  background: var(--blk2);
  border: 1px solid var(--g2);
  border-radius: 20px;
  padding: 48px;
  width: 100%;
  max-width: 420px;
  position: relative;
  overflow: hidden;
}
.card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, transparent, var(--o), var(--y), transparent);
}
.logo {
  font-family: 'DM Sans', sans-serif;
  font-weight: 800; font-size: 20px;
  color: var(--y); text-decoration: none;
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 36px;
}
.logo span { width: 7px; height: 7px; background: var(--y); border-radius: 50%; }
h1 {
  font-family: 'DM Sans', sans-serif;
  font-size: 28px; font-weight: 800;
  letter-spacing: -1px; margin-bottom: 8px;
}
.sub { font-size: 14px; color: var(--tx2); margin-bottom: 32px; line-height: 1.5; }
.btn-google {
  width: 100%; padding: 13px 16px;
  background: var(--g1); border: 1px solid var(--g2);
  border-radius: 10px; color: var(--tx);
  font-size: 14px; font-weight: 600;
  font-family: 'DM Sans', sans-serif;
  cursor: pointer; display: flex; align-items: center;
  justify-content: center; gap: 10px;
  transition: border-color 0.2s, background 0.2s;
  margin-bottom: 20px;
}
.btn-google:hover { border-color: rgba(255,230,0,0.3); background: var(--g2); }
.divider {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 20px;
}
.divider::before, .divider::after {
  content: ''; flex: 1; height: 1px; background: var(--g2);
}
.divider span { font-size: 12px; color: var(--tx3); white-space: nowrap; }
.form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
.form-label { font-size: 12px; font-weight: 600; color: var(--tx2); }
.form-input {
  background: var(--g1); border: 1px solid var(--g2);
  border-radius: 10px; padding: 13px 16px;
  color: var(--tx); font-size: 14px;
  font-family: 'DM Sans', sans-serif;
  outline: none; transition: border-color 0.2s; width: 100%;
}
.form-input:focus { border-color: rgba(255,230,0,0.4); }
.form-input::placeholder { color: var(--tx3); }
.btn-primary {
  width: 100%; padding: 14px;
  background: var(--y); border: none;
  border-radius: 10px; color: #000;
  font-size: 15px; font-weight: 800;
  font-family: 'DM Sans', sans-serif;
  cursor: pointer; margin-top: 6px;
  transition: background 0.2s;
}
.btn-primary:hover { background: linear-gradient(135deg, #FFE066, #FFAA00); transform: translateY(-1px); box-shadow: 0 4px 20px rgba(255,180,0,0.3); }
.btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
.footer-link {
  text-align: center; margin-top: 24px;
  font-size: 13px; color: var(--tx3);
}
.footer-link a { color: var(--tx2); text-decoration: none; }
.footer-link a:hover { color: var(--y); }
.msg { font-size: 13px; margin-top: 12px; text-align: center; min-height: 20px; }
.msg.err { color: var(--red); }
.msg.ok { color: var(--grn); }
</style>
</head>
<body>
<div class="card">
  <a class="logo" href="/"><img src="/viralmaxlogo.png" style="height:28px;width:auto;"></a>
  <h1>Create your account</h1>
  <p class="sub">No credit card required.</p>

  <button class="btn-google" id="googleBtn">
    <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z"/></svg>
    Continue with Google
  </button>

  <div class="divider"><span>or sign up with email</span></div>

  <form id="signupForm">
    <div class="form-group">
      <label class="form-label">Email</label>
      <input class="form-input" type="email" id="email" placeholder="you@example.com" required>
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input class="form-input" type="password" id="password" placeholder="Min. 8 characters" required minlength="8">
    </div>
    <button class="btn-primary" type="submit" id="submitBtn">Create account</button>
  </form>

  <div class="msg" id="msg"></div>

  <div class="footer-link">
    Already have an account? <a href="/login">Sign in</a>
  </div>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
const sb = createClient(
  'https://asvpzsnncbxkpycsgfnj.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFzdnB6c25uY2J4a3B5Y3NnZm5qIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3OTMwOTksImV4cCI6MjA5MTM2OTA5OX0.S1poy30uv9R6_xG8d-wi27eIgeXbvlVIaLbgAljM4j0'
);
const msg = document.getElementById('msg');

// Redirect if already logged in
sb.auth.getSession().then(({ data }) => {
  if (data.session) window.location.href = '/app';
});

// Google sign up
document.getElementById('googleBtn').addEventListener('click', async () => {
  const { error } = await sb.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: window.location.origin + '/app' }
  });
  if (error) { msg.textContent = error.message; msg.className = 'msg err'; }
});

// Email sign up
document.getElementById('signupForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('submitBtn');
  btn.textContent = 'Creating account...'; btn.disabled = true;
  msg.textContent = ''; msg.className = 'msg';

  const { data, error } = await sb.auth.signUp({
    email, password,
    options: { emailRedirectTo: window.location.origin + '/app' }
  });

  if (error) {
    msg.textContent = error.message; msg.className = 'msg err';
    btn.textContent = 'Create account'; btn.disabled = false;
    return;
  }

  msg.textContent = 'Check your email to confirm your account!';
  msg.className = 'msg ok';
  btn.textContent = 'Create account'; btn.disabled = false;
});
</script>
</body>
</html>
