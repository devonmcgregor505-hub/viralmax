<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — Viralmax</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Space+Mono&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --y: #FFE600; --blk: #050505; --blk2: #0a0a0a; --g1: #1a1a1a; --g2: #222; --g3: #2e2e2e;
  --tx: #f5f5f0; --tx2: #999; --tx3: #555; --grn: #00E676; --red: #FF3D3D;
}
body { font-family: 'Manrope', sans-serif; background: var(--blk); color: var(--tx); min-height: 100vh; display: flex; align-items: center; justify-content: center; }

.login-wrap {
  width: 100%; max-width: 440px; padding: 20px;
}

.login-card {
  background: var(--blk2); border: 1px solid var(--g1); border-radius: 20px;
  padding: 48px; position: relative; overflow: hidden;
}

.login-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, transparent, var(--y), transparent);
}

.login-logo {
  font-family: 'Syne', sans-serif; font-weight: 800; font-size: 22px;
  color: var(--y); text-decoration: none; display: flex; align-items: center; gap: 8px;
  margin-bottom: 40px;
}
.login-logo span { width: 8px; height: 8px; background: var(--y); border-radius: 50%; }

h1 { font-family: 'Syne', sans-serif; font-size: 30px; font-weight: 800; letter-spacing: -1px; margin-bottom: 8px; }
.sub { font-size: 14px; color: var(--tx2); margin-bottom: 36px; }

.form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
.form-label { font-size: 12px; font-weight: 600; color: var(--tx2); }

.form-input {
  background: var(--g1); border: 1px solid var(--g2); border-radius: 10px;
  padding: 13px 16px; color: var(--tx); font-size: 14px; font-family: 'Manrope', sans-serif;
  outline: none; transition: border-color 0.2s; width: 100%;
}
.form-input:focus { border-color: rgba(255,230,0,0.4); }
.form-input::placeholder { color: var(--tx3); }

.forgot { text-align: right; font-size: 12px; color: var(--tx3); margin-bottom: 24px; }
.forgot a { color: var(--y); text-decoration: none; }

.btn-google {
  width: 100%; padding: 13px; background: var(--g1); border: 1px solid var(--g2);
  border-radius: 10px; color: var(--tx); font-size: 14px; font-weight: 600;
  font-family: 'Manrope', sans-serif; cursor: pointer; transition: all 0.2s;
  display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 16px;
}
.btn-google:hover { border-color: var(--g3); background: var(--g2); }

.divider { display: flex; align-items: center; gap: 12px; margin: 20px 0; }
.divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--g2); }
.divider span { font-size: 12px; color: var(--tx3); }

.btn-submit {
  width: 100%; padding: 14px; background: var(--y); border: none; border-radius: 10px;
  color: #000; font-size: 14px; font-weight: 800; font-family: 'Syne', sans-serif;
  cursor: pointer; transition: all 0.2s; margin-top: 4px;
}
.btn-submit:hover { background: #FFF176; box-shadow: 0 4px 20px rgba(255,230,0,0.3); }

.switch { margin-top: 24px; font-size: 13px; color: var(--tx3); text-align: center; }
.switch a { color: var(--y); text-decoration: none; font-weight: 600; }
</style>
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <a class="login-logo" href="/"><span></span>Viralmax</a>
    <h1>Welcome back</h1>
    <p class="sub">Sign in to your account</p>

    <button class="btn-google" onclick="signInGoogle()">
      <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M16.51 8H8.98v3h4.3c-.18 1-.74 1.48-1.6 2.04v2.01h2.6a7.8 7.8 0 0 0 2.38-5.88c0-.57-.05-.66-.15-1.18z"/><path fill="#34A853" d="M8.98 17c2.16 0 3.97-.72 5.3-1.94l-2.6-2.04a4.8 4.8 0 0 1-7.18-2.54H1.83v2.07A8 8 0 0 0 8.98 17z"/><path fill="#FBBC05" d="M4.5 10.48A4.8 4.8 0 0 1 4.5 7.5V5.43H1.83a8 8 0 0 0 0 7.14z"/><path fill="#EA4335" d="M8.98 3.58c1.32 0 2.5.45 3.44 1.35l2.58-2.58C13.46.9 11.43 0 8.98 0a8 8 0 0 0-7.15 4.43l2.67 2.07c.63-1.89 2.4-2.92 4.48-2.92z"/></svg>
      Continue with Google
    </button>

    <div class="divider"><span>or</span></div>

    <form onsubmit="handleLogin(event)">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" class="form-input" id="email" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" class="form-input" id="password" placeholder="Your password" required>
      </div>
      <div class="forgot"><a href="#">Forgot password?</a></div>
      <button type="submit" class="btn-submit" id="submitBtn">Sign in →</button>
    </form>

    <div class="switch">Don't have an account? <a href="signup.html">Sign up free</a></div>
  </div>
</div>

<script>
function signInGoogle() { alert('Google sign-in coming soon.'); }

async function handleLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  btn.textContent = 'Signing in…'; btn.disabled = true;
  // TODO: Connect to auth backend
  setTimeout(() => { window.location.href = 'app.html'; }, 1200);
}
</script>
</body>
</html>
