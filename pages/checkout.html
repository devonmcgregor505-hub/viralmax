<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout — Viralmax</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#060606;color:#f0f0f0;min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:#0d0d0d;border:1px solid #1a1a1a;border-radius:20px;padding:48px;max-width:440px;width:100%;text-align:center}
.logo{color:#FFE600;font-weight:800;font-size:22px;margin-bottom:32px;display:block;text-decoration:none}
h1{font-size:28px;font-weight:800;margin-bottom:8px}
p{color:#888;font-size:14px;margin-bottom:32px}
.btn{width:100%;padding:14px;background:#FFE600;border:none;border-radius:10px;color:#000;font-size:15px;font-weight:800;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif}
.btn:hover{background:#FFF176}
.btn:disabled{opacity:0.6;cursor:not-allowed}
.plans{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px}
.plan{background:#1a1a1a;border:1px solid #222;border-radius:10px;padding:16px;cursor:pointer;transition:all 0.2s}
.plan.selected{border-color:#FFE600;background:rgba(255,230,0,0.05)}
.plan-name{font-size:11px;color:#666;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.plan-price{font-size:24px;font-weight:800;color:#f0f0f0}
.plan-desc{font-size:11px;color:#555;margin-top:4px}
.plan.selected .plan-price{color:#FFE600}
</style>
</head>
<body>
<div class="card">
  <a class="logo" href="/">• Viralmax</a>
  <h1>Upgrade your plan</h1>
  <p>Choose a plan to get more credits</p>
  <div class="plans" style="grid-template-columns:1fr 1fr 1fr;">
    <div class="plan" id="plan-starter" onclick="selectPlan('starter')">
      <div class="plan-name">Starter</div>
      <div class="plan-price">$15<span style="font-size:14px;font-weight:400">/mo</span></div>
      <div class="plan-desc">1,500 credits/mo</div>
    </div>
    <div class="plan selected" id="plan-pro" onclick="selectPlan('pro')">
      <div class="plan-name">Pro ⭐</div>
      <div class="plan-price">$30<span style="font-size:14px;font-weight:400">/mo</span></div>
      <div class="plan-desc">3,500 credits/mo</div>
    </div>
    <div class="plan" id="plan-studio" onclick="selectPlan('studio')">
      <div class="plan-name">Studio</div>
      <div class="plan-price">$60<span style="font-size:14px;font-weight:400">/mo</span></div>
      <div class="plan-desc">9,000 credits/mo</div>
    </div>
  </div>
  <div style="margin-bottom:12px;text-align:center;">
    <div class="plan" id="plan-topup" onclick="selectPlan('topup')" style="display:inline-block;min-width:200px;margin-top:8px;">
      <div class="plan-name">One-time Top-up</div>
      <div class="plan-price">$5</div>
      <div class="plan-desc">500 credits, no subscription</div>
    </div>
  </div>
  <button class="btn" id="payBtn" onclick="startCheckout()">Continue to payment →</button>
</div>
<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
const sb = createClient('https://asvpzsnncbxkpycsgfnj.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFzdnB6c25uY2J4a3B5Y3NnZm5qIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3OTMwOTksImV4cCI6MjA5MTM2OTA5OX0.S1poy30uv9R6_xG8d-wi27eIgeXbvlVIaLbgAljM4j0');

let selectedPlan = 'pro';
const urlPlan = new URLSearchParams(window.location.search).get('plan');
if (urlPlan === 'topup') { selectPlan('topup'); }

window.selectPlan = (plan) => {
  selectedPlan = plan;
  document.getElementById('plan-monthly').classList.toggle('selected', plan === 'monthly');
  document.getElementById('plan-topup').classList.toggle('selected', plan === 'topup');
};

window.startCheckout = async () => {
  const btn = document.getElementById('payBtn');
  btn.disabled = true;
  btn.textContent = 'Redirecting...';
  try {
    const { data } = await sb.auth.getUser();
    const userId = data?.user?.id || 'guest';
    const userEmail = data?.user?.email || '';
    const endpoint = selectedPlan === 'topup' ? '/api/checkout/topup' : '/api/checkout/monthly';
    const resp = await fetch(endpoint, {
      method: 'POST',
      headers: { 'x-user-id': userId, 'x-user-email': userEmail, 'origin': window.location.origin }
    });
    const json = await resp.json();
    if (json.url) { window.location.href = json.url; }
    else { alert('Error: ' + JSON.stringify(json)); btn.disabled = false; btn.textContent = 'Continue to payment →'; }
  } catch(err) {
    alert('Error: ' + err.message);
    btn.disabled = false;
    btn.textContent = 'Continue to payment →';
  }
};
</script>
</body>
</html>
